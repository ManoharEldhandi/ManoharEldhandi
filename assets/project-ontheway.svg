<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="316" viewBox="0 0 1280 316" role="img" aria-labelledby="title desc">
  <title id="title">OnTheWay - Route-Aware Pickup and Reservation Platform</title>
  <desc id="desc">A dark project panel describing a Java Spring Boot platform that synchronizes preparation with a customer's live arrival time.</desc>
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#30363d"/><stop offset="1" stop-color="#161b22"/></linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#161b22"/><stop offset="1" stop-color="#0d1117"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#21262d"/><stop offset="1" stop-color="#0d1117"/></linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#010409" flood-opacity="0.55"/></filter>
    <filter id="small" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#010409" flood-opacity="0.48"/></filter>
  </defs>
  <rect x="24" y="18" width="1232" height="276" rx="28" fill="url(#case)" stroke="#484f58" stroke-width="2" filter="url(#shadow)"/>
  <rect x="42" y="36" width="1196" height="240" rx="18" fill="url(#board)" stroke="#30363d" stroke-width="2"/>
  <g font-family="Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="71" y="62" width="250" height="40" rx="8" fill="#1f6feb"/>
    <text x="89" y="88" fill="#ffffff" font-size="15" font-weight="800" letter-spacing="1.3">01 · BACKEND PLATFORM</text>
    <text x="71" y="159" fill="#f0f6fc" font-size="52" font-weight="800">OnTheWay</text>
    <text x="72" y="199" fill="#b1bac4" font-size="22" font-weight="600">Route-aware pickup, ready exactly when you arrive.</text>
    <text x="72" y="243" fill="#8b949e" font-size="17" font-weight="750">JAVA 17 · SPRING BOOT · REACT · MYSQL · KAFKA · DOCKER</text>
    <g transform="translate(751 64)" filter="url(#small)">
      <rect width="434" height="178" rx="15" fill="url(#screen)" stroke="#484f58" stroke-width="1.5"/>
      <text x="26" y="36" fill="#8b949e" font-size="14" font-weight="780" letter-spacing="1.7">ETA SYNCHRONIZATION ENGINE</text>
      <path d="M52 107 C114 42 194 152 269 86 S358 85 389 64" fill="none" stroke="#58a6ff" stroke-width="5" stroke-linecap="round"/>
      <circle cx="52" cy="107" r="12" fill="#1f6feb" stroke="#79c0ff" stroke-width="3"/>
      <circle cx="269" cy="86" r="10" fill="#d29922" stroke="#e3b341" stroke-width="3"/>
      <circle cx="389" cy="64" r="12" fill="#3fb950" stroke="#56d364" stroke-width="3"/>
      <text x="31" y="150" fill="#b1bac4" font-size="13" font-weight="800">YOU</text>
      <text x="229" y="150" fill="#b1bac4" font-size="13" font-weight="800">PREP STARTS</text>
      <text x="358" y="150" fill="#b1bac4" font-size="13" font-weight="800">READY</text>
    </g>
  </g>
