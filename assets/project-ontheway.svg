<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="316" viewBox="0 0 1280 316" role="img" aria-labelledby="title desc">
  <title id="title">OnTheWay - Route-Aware Pickup and Reservation Platform</title>
  <desc id="desc">A clean dark navy project card with gold edging and a route synchronization diagram.</desc>
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#17263b"/><stop offset="1" stop-color="#09111e"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#111d2f"/><stop offset="1" stop-color="#080f1b"/></linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#efd594"/><stop offset="0.5" stop-color="#c29a4f"/><stop offset="1" stop-color="#6f542b"/></linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="160%"><feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#03070d" flood-opacity="0.46"/></filter>
  </defs>
  <rect width="1280" height="316" fill="#0a111d"/>
  <path d="M24 0V316M1256 0V316" stroke="#c29a4f" stroke-width="4"/>
  <rect x="50" y="18" width="1180" height="280" rx="17" fill="url(#plate)" stroke="#718096" stroke-width="2"/>
  <g text-rendering="geometricPrecision">
    <rect x="70" y="61" width="238" height="40" rx="7" fill="#d6b56d"/>
    <text x="88" y="88" fill="#172238" font-family="Trebuchet MS, Verdana, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">01 · BACKEND PLATFORM</text>
    <text x="70" y="163" fill="#fffaf0" font-family="Georgia, Times New Roman, serif" font-size="55" font-weight="700">OnTheWay</text>
    <text x="72" y="205" fill="#c1d3e9" font-family="Trebuchet MS, Verdana, sans-serif" font-size="23" font-weight="700">Route-aware pickup, ready exactly when you arrive.</text>
    <text x="72" y="247" fill="#9fb2ca" font-family="Trebuchet MS, Verdana, sans-serif" font-size="18" font-weight="700">Routing · fulfillment · multi-role commerce</text>

    <rect x="748" y="62" width="438" height="182" rx="14" fill="url(#screen)" stroke="#596b83" stroke-width="1.5"/>
    <text x="777" y="100" fill="#d6b56d" font-family="Trebuchet MS, Verdana, sans-serif" font-size="15" font-weight="700" letter-spacing="1.3">ARRIVAL SYNCHRONIZATION</text>
    <path d="M800 171 C856 109 933 214 1009 147 S1103 150 1141 119" fill="none" stroke="#d6b56d" stroke-width="5" stroke-linecap="round"/>
    <circle cx="800" cy="171" r="11" fill="#75b5ff"/><circle cx="1009" cy="147" r="10" fill="#d6b56d"/><circle cx="1141" cy="119" r="11" fill="#55d187"/>
    <text x="782" y="215" fill="#d8e3f0" font-family="Trebuchet MS, Verdana, sans-serif" font-size="14" font-weight="700">YOU</text>
    <text x="967" y="215" fill="#d8e3f0" font-family="Trebuchet MS, Verdana, sans-serif" font-size="14" font-weight="700">PREP STARTS</text>
    <text x="1117" y="215" fill="#d8e3f0" font-family="Trebuchet MS, Verdana, sans-serif" font-size="14" font-weight="700">READY</text>
  </g>
