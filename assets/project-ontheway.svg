<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="310" viewBox="0 0 1280 310" role="img" aria-labelledby="title desc">
  <title id="title">OnTheWay - Route-Aware Pickup and Reservation Platform</title>
  <desc id="desc">A tactile project card describing a Java Spring Boot platform that synchronizes preparation with a customer's live arrival time.</desc>
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#efe8dc"/><stop offset="1" stop-color="#b8b0a4"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#16263d"/><stop offset="1" stop-color="#0a1423"/></linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#080c13" flood-opacity="0.3"/></filter>
  </defs>
  <rect x="24" y="18" width="1232" height="270" rx="28" fill="url(#case)" stroke="#777168" stroke-width="2" filter="url(#shadow)"/>
  <rect x="42" y="36" width="1196" height="234" rx="18" fill="url(#screen)" stroke="#07101d" stroke-width="2"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="71" y="62" width="232" height="34" rx="7" fill="#f3c44f"/>
    <text x="88" y="84" fill="#192238" font-size="13" font-weight="800" letter-spacing="1.6">01 · BACKEND PLATFORM</text>
    <text x="71" y="148" fill="#fffaf0" font-size="43" font-weight="780">OnTheWay</text>
    <text x="72" y="182" fill="#abc0dc" font-size="19">Route-aware pickup, ready exactly when you arrive.</text>
    <text x="72" y="223" fill="#d9e0e9" font-size="15" font-weight="650">JAVA 17 · SPRING BOOT · REACT · MYSQL · KAFKA · DOCKER</text>

    <g transform="translate(761 64)">
      <rect width="424" height="174" rx="15" fill="#0a1220" stroke="#354b68" stroke-width="1.5"/>
      <text x="26" y="34" fill="#8296af" font-size="12" font-weight="700" letter-spacing="2">ETA SYNCHRONIZATION ENGINE</text>
      <path d="M52 105 C114 40 190 150 264 84 S354 83 379 63" fill="none" stroke="#f3c44f" stroke-width="5" stroke-linecap="round"/>
      <circle cx="52" cy="105" r="12" fill="#5aa8ff" stroke="#d8edff" stroke-width="3"/>
      <circle cx="264" cy="84" r="10" fill="#f3c44f" stroke="#fff1b5" stroke-width="3"/>
      <circle cx="379" cy="63" r="12" fill="#55d187" stroke="#d5ffe3" stroke-width="3"/>
      <text x="31" y="145" fill="#96a8be" font-size="11" font-weight="700">YOU</text>
      <text x="224" y="145" fill="#96a8be" font-size="11" font-weight="700">PREP STARTS</text>
      <text x="348" y="145" fill="#96a8be" font-size="11" font-weight="700">READY</text>
    </g>
  </g>
</svg>
