<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="130" viewBox="0 0 1200 130" role="img" aria-labelledby="title desc">
  <title id="title">Profile Footer</title>
  <desc id="desc">Animated footer line for Manohar Eldhandi's GitHub profile.</desc>
  <defs>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316" />
      <stop offset="0.32" stop-color="#22c55e" />
      <stop offset="0.66" stop-color="#a855f7" />
      <stop offset="1" stop-color="#facc15" />
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d1117" />
      <stop offset="0.5" stop-color="#15120d" />
      <stop offset="1" stop-color="#101415" />
    </linearGradient>
    <style>
      .flow { stroke-dasharray: 22 24; animation: move 16s linear infinite; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      @keyframes move { to { stroke-dashoffset: -560; } }
    </style>
  </defs>
  <rect width="1200" height="130" rx="26" fill="url(#bg)" />
  <path class="flow" d="M30 72 C170 26 282 116 418 66 S670 24 822 70 1044 116 1170 44" fill="none" stroke="url(#stroke)" stroke-width="5" opacity="0.82" />
  <text x="92" y="52" class="mono" fill="#ffffff" font-size="20" font-weight="700">AI systems, backend APIs, reliable automation</text>
  <text x="92" y="92" class="mono" fill="#a7f3d0" font-size="14" font-weight="700">Generative AI, backend engineering, competitive programming</text>
</svg>
