<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-labelledby="title desc">
  <title id="title">Manohar Eldhandi - Generative AI Systems and Backend Engineering</title>
  <desc id="desc">Animated developer profile header with code, workflow nodes, backend APIs, MCP, LangGraph, AI systems, and automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b14" />
      <stop offset="0.48" stop-color="#0d1322" />
      <stop offset="1" stop-color="#15100b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316" />
      <stop offset="0.32" stop-color="#22c55e" />
      <stop offset="0.66" stop-color="#38bdf8" />
      <stop offset="1" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827" />
      <stop offset="1" stop-color="#0b111d" />
    </linearGradient>
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.48" />
      <stop offset="1" stop-color="#f97316" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.34" />
      <stop offset="1" stop-color="#22c55e" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.32" />
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="22" />
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <style>
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .muted { fill: #aab4c3; }
      .flow { stroke-dasharray: 12 18; animation: flow 18s linear infinite; }
      .flowSlow { stroke-dasharray: 6 16; animation: flow 24s linear infinite reverse; }
      .pulse { animation: pulse 4.8s ease-in-out infinite; transform-origin: center; }
      .floatOne { animation: floatOne 7s ease-in-out infinite; }
      .floatTwo { animation: floatTwo 8s ease-in-out infinite; }
      .blink { animation: blink 1.2s step-end infinite; }
      @keyframes flow { to { stroke-dashoffset: -420; } }
      @keyframes pulse { 0%,100% { opacity: 0.55; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.04); } }
      @keyframes floatOne { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
      @keyframes floatTwo { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
      @keyframes blink { 50% { opacity: 0.2; } }
    </style>
  </defs>

  <rect width="1200" height="340" rx="34" fill="url(#bg)" />
  <circle cx="1020" cy="50" r="190" fill="url(#orangeGlow)" filter="url(#softBlur)" />
  <circle cx="935" cy="250" r="190" fill="url(#greenGlow)" filter="url(#softBlur)" />
  <circle cx="520" cy="10" r="180" fill="url(#blueGlow)" filter="url(#softBlur)" />

  <path d="M0 76 H1200 M0 140 H1200 M0 204 H1200 M0 268 H1200" stroke="#ffffff" stroke-opacity="0.035" />
  <path d="M112 0 V340 M260 0 V340 M408 0 V340 M556 0 V340 M704 0 V340 M852 0 V340 M1000 0 V340" stroke="#ffffff" stroke-opacity="0.026" />

  <g transform="translate(72 58)">
    <text class="mono" x="0" y="0" fill="#f97316" font-size="18" font-weight="700">Software Engineer Trainee at Cisco</text>
    <text class="sans" x="0" y="66" fill="#ffffff" font-size="58" font-weight="800">Manohar Eldhandi</text>
    <text class="sans" x="2" y="114" fill="#e5e7eb" font-size="28" font-weight="700">Generative AI Systems and Backend Engineering</text>
    <text class="sans" x="2" y="151" fill="#b7f7d3" font-size="18" font-weight="600">MCP servers, LangGraph workflows, AI systems, secure APIs, automation</text>

    <g transform="translate(0 184)">
      <rect x="0" y="0" width="138" height="36" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.16" />
      <text class="mono" x="24" y="24" fill="#f97316" font-size="14" font-weight="700">LangGraph</text>
      <rect x="154" y="0" width="92" height="36" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.16" />
      <text class="mono" x="183" y="24" fill="#22c55e" font-size="14" font-weight="700">MCP</text>
      <rect x="262" y="0" width="116" height="36" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.16" />
      <text class="mono" x="286" y="24" fill="#38bdf8" font-size="14" font-weight="700">AI Assist</text>
      <rect x="394" y="0" width="150" height="36" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.16" />
      <text class="mono" x="416" y="24" fill="#facc15" font-size="14" font-weight="700">Backend APIs</text>
    </g>
  </g>

  <path class="flow" d="M640 248 C724 210 794 248 862 220 S1010 180 1138 216" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.42" />

  <g filter="url(#shadow)" transform="translate(736 56)">
    <rect x="0" y="0" width="392" height="226" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.12" />
    <rect x="0" y="0" width="392" height="44" rx="24" fill="#ffffff" fill-opacity="0.05" />
    <circle cx="28" cy="23" r="6" fill="#ef4444" />
    <circle cx="48" cy="23" r="6" fill="#facc15" />
    <circle cx="68" cy="23" r="6" fill="#22c55e" />
    <text class="mono" x="276" y="28" fill="#94a3b8" font-size="12">workflow.py</text>

    <text class="mono" x="28" y="78" fill="#94a3b8" font-size="14">def build_system():</text>
    <text class="mono" x="54" y="108" fill="#f97316" font-size="14">context = engineering_tools()</text>
    <text class="mono" x="54" y="138" fill="#22c55e" font-size="14">assistant = ai_workflow(context)</text>
    <text class="mono" x="54" y="168" fill="#38bdf8" font-size="14">api = secure_backend(assistant)</text>

    <g transform="translate(34 188)">
      <rect x="0" y="0" width="62" height="28" rx="14" fill="#f97316" fill-opacity="0.16" stroke="#f97316" stroke-opacity="0.45" />
      <text class="mono" x="19" y="19" fill="#f97316" font-size="11" font-weight="800">MCP</text>
      <path d="M68 14 H98" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2" />
      <rect x="104" y="0" width="58" height="28" rx="14" fill="#22c55e" fill-opacity="0.16" stroke="#22c55e" stroke-opacity="0.45" />
      <text class="mono" x="125" y="19" fill="#22c55e" font-size="11" font-weight="800">AI</text>
      <path d="M168 14 H198" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2" />
      <rect x="204" y="0" width="62" height="28" rx="14" fill="#38bdf8" fill-opacity="0.16" stroke="#38bdf8" stroke-opacity="0.45" />
      <text class="mono" x="222" y="19" fill="#38bdf8" font-size="11" font-weight="800">API</text>
      <path d="M272 14 H302" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2" />
      <rect x="308" y="0" width="58" height="28" rx="14" fill="#a855f7" fill-opacity="0.16" stroke="#a855f7" stroke-opacity="0.45" />
      <text class="mono" x="321" y="19" fill="#a855f7" font-size="11" font-weight="800">TEST</text>
    </g>
  </g>
</svg>
