<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Manohar Eldhandi - Software Engineer Trainee at Cisco</title>
  <desc id="desc">Animated profile header for Manohar Eldhandi, focused on generative AI systems, backend engineering, MCP, LangGraph, and RAG.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117" />
      <stop offset="0.45" stop-color="#17110d" />
      <stop offset="1" stop-color="#101415" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316" />
      <stop offset="0.35" stop-color="#22c55e" />
      <stop offset="0.7" stop-color="#a855f7" />
      <stop offset="1" stop-color="#facc15" />
    </linearGradient>
    <radialGradient id="warmGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.45" />
      <stop offset="1" stop-color="#f97316" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.35" />
      <stop offset="1" stop-color="#22c55e" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18" />
    </filter>
    <style>
      .flow { stroke-dasharray: 18 22; animation: dash 18s linear infinite; }
      .float-a { animation: floatA 6s ease-in-out infinite; }
      .float-b { animation: floatB 7s ease-in-out infinite; }
      .pulse { animation: pulse 4.5s ease-in-out infinite; transform-origin: center; }
      .chip { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.16); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      @keyframes dash { to { stroke-dashoffset: -520; } }
      @keyframes floatA { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      @keyframes floatB { 0%,100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
      @keyframes pulse { 0%,100% { opacity: 0.45; transform: scale(0.96); } 50% { opacity: 1; transform: scale(1.04); } }
    </style>
  </defs>

  <rect width="1200" height="300" rx="32" fill="url(#bg)" />
  <circle cx="1060" cy="58" r="148" fill="url(#warmGlow)" filter="url(#blur)" />
  <circle cx="945" cy="238" r="150" fill="url(#greenGlow)" filter="url(#blur)" />

  <path class="flow" d="M44 228 C220 118 342 300 505 176 S750 48 926 134 1085 246 1156 154" fill="none" stroke="url(#line)" stroke-width="4" opacity="0.72" />
  <path class="flow" d="M706 58 C830 86 850 174 958 184 S1128 130 1172 224" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.42" />

  <g class="float-a">
    <circle cx="884" cy="96" r="12" fill="#f97316" opacity="0.95" />
    <circle cx="1030" cy="152" r="9" fill="#22c55e" opacity="0.95" />
    <circle cx="958" cy="218" r="11" fill="#a855f7" opacity="0.9" />
    <path d="M884 96 L1030 152 L958 218 L884 96" fill="none" stroke="rgba(255,255,255,0.34)" stroke-width="2" />
  </g>

  <g class="float-b">
    <circle class="pulse" cx="1098" cy="88" r="26" fill="none" stroke="#facc15" stroke-width="3" />
    <circle cx="1098" cy="88" r="5" fill="#facc15" />
  </g>

  <text x="74" y="88" class="mono" fill="#f97316" font-size="20" font-weight="700">Software Engineer Trainee at Cisco</text>
  <text x="74" y="142" class="sans" fill="#ffffff" font-size="58" font-weight="800" letter-spacing="0">Manohar Eldhandi</text>
  <text x="78" y="188" class="sans" fill="#e5e7eb" font-size="25" font-weight="700">Generative AI Systems and Backend Engineering</text>
  <text x="78" y="222" class="sans" fill="#a7f3d0" font-size="18" font-weight="600">MCP servers, LangGraph workflows, RAG systems, secure APIs, automation</text>

  <g transform="translate(78 245)">
    <rect class="chip" x="0" y="0" width="126" height="34" rx="17" />
    <text x="20" y="23" class="mono" fill="#f97316" font-size="14" font-weight="700">LangGraph</text>
    <rect class="chip" x="140" y="0" width="80" height="34" rx="17" />
    <text x="166" y="23" class="mono" fill="#22c55e" font-size="14" font-weight="700">MCP</text>
    <rect class="chip" x="234" y="0" width="78" height="34" rx="17" />
    <text x="262" y="23" class="mono" fill="#a855f7" font-size="14" font-weight="700">RAG</text>
    <rect class="chip" x="326" y="0" width="150" height="34" rx="17" />
    <text x="350" y="23" class="mono" fill="#facc15" font-size="14" font-weight="700">Backend APIs</text>
  </g>
</svg>
