<svg xmlns="http://www.w3.org/2000/svg" width="960" height="210" viewBox="0 0 960 210" role="img" aria-labelledby="title desc">
  <title id="title">Rotating profile highlights</title>
  <desc id="desc">A one-at-a-time typewriter loop showing Manohar Eldhandi's strongest profile highlights.</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0H0V28" fill="none" stroke="#0b0b0b" stroke-opacity="0.08" /></pattern>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="120%"><feDropShadow dx="6" dy="6" stdDeviation="0" flood-color="#0b0b0b" flood-opacity="1" /></filter>
    <clipPath id="tw1" clipPathUnits="userSpaceOnUse"><rect x="92" y="112" width="720" height="34"><animate attributeName="width" values="720;720;0;0;720;720;0;0" keyTimes="0;0.17;0.20;0.21;0.235;0.245;0.25;1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="tw2" clipPathUnits="userSpaceOnUse"><rect x="92" y="112" width="0" height="34"><animate attributeName="width" values="0;0;720;720;0;0" keyTimes="0;0.285;0.41;0.485;0.50;1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="tw3" clipPathUnits="userSpaceOnUse"><rect x="92" y="112" width="0" height="34"><animate attributeName="width" values="0;0;720;720;0;0" keyTimes="0;0.535;0.66;0.735;0.75;1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="tw4" clipPathUnits="userSpaceOnUse"><rect x="92" y="112" width="0" height="34"><animate attributeName="width" values="0;0;720;720;0" keyTimes="0;0.785;0.91;0.985;1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <style><![CDATA[
      .line{stroke:#0b0b0b;stroke-width:3}.thin{stroke:#0b0b0b;stroke-width:2}.mono{font-family:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;font-weight:850}.sans{font-family:"Space Grotesk","Trebuchet MS",Arial,sans-serif;font-weight:900}.hint{font-size:12px;letter-spacing:1.2px}.prompt{font-size:25px;fill:#ffd426}.type{font-size:24px}.cursor{animation:blink 1s steps(2,end) infinite}.scan{opacity:.18;animation:scan 5s ease-in-out infinite}@keyframes blink{50%{opacity:0}}@keyframes scan{0%,100%{transform:translateX(-260px)}50%{transform:translateX(850px)}}
    ]]></style>
  </defs>
  <rect width="960" height="210" fill="#f5f1e8" /><rect width="960" height="210" fill="url(#grid)" />
  <circle cx="850" cy="24" r="94" fill="#ffd426" opacity=".28" /><circle cx="84" cy="188" r="92" fill="#00a7b5" opacity=".16" />
  <g filter="url(#shadow)"><rect x="28" y="30" width="904" height="150" fill="#0b0b0b" class="line" /></g><rect x="28" y="30" width="904" height="150" fill="#0b0b0b" class="line" />
  <rect x="28" y="30" width="904" height="38" fill="#ffd426" class="thin" />
  <circle cx="55" cy="49" r="6" fill="#ff5a8a" stroke="#0b0b0b" stroke-width="2" /><circle cx="78" cy="49" r="6" fill="#00a7b5" stroke="#0b0b0b" stroke-width="2" /><circle cx="101" cy="49" r="6" fill="#fffdf5" stroke="#0b0b0b" stroke-width="2" />
  <rect x="130" y="47" width="124" height="6" fill="#0b0b0b" /><rect x="268" y="47" width="82" height="6" fill="#00a7b5" /><rect x="364" y="47" width="104" height="6" fill="#ff5a8a" /><g class="scan"><rect x="0" y="68" width="150" height="112" fill="#00a7b5" /></g>
  <text x="56" y="138" class="mono prompt">$</text>
  <g clip-path="url(#tw1)" opacity="1"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.245;0.25;1" dur="16s" repeatCount="indefinite" /><text x="92" y="138" class="mono type" fill="#ffd426">Software Engineer Trainee @ Cisco</text></g>
  <g clip-path="url(#tw2)" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.245;0.25;0.495;0.50;1" dur="16s" repeatCount="indefinite" /><text x="92" y="138" class="mono type" fill="#00d4df">AI compliance systems across Cisco products</text></g>
  <g clip-path="url(#tw3)" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.495;0.50;0.745;0.75;1" dur="16s" repeatCount="indefinite" /><text x="92" y="138" class="mono type" fill="#ff7aa2">MCP tools, LangGraph/RAG, Playwright automation</text></g>
  <g clip-path="url(#tw4)" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.745;0.75;0.995;1" dur="16s" repeatCount="indefinite" /><text x="92" y="138" class="mono type" fill="#9cf2b6">Codeforces Master, rating 2128</text></g>
  <rect class="cursor" x="842" y="114" width="13" height="30" fill="#ffd426" />
</svg>