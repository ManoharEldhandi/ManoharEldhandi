<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="316" viewBox="0 0 1280 316" role="img" aria-labelledby="title desc">
  <title id="title">WaterNet - Water Potability and Quality Classification Platform</title>
  <desc id="desc">A dark project panel illustrating nine water chemistry inputs flowing through a three-model voting ensemble to a traceable prediction API.</desc>
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#30363d"/><stop offset="1" stop-color="#161b22"/></linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#161b22"/><stop offset="1" stop-color="#0d1117"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#21262d"/><stop offset="1" stop-color="#0d1117"/></linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#010409" flood-opacity="0.55"/></filter>
    <filter id="small" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#010409" flood-opacity="0.48"/></filter>
  </defs>
  <rect x="24" y="18" width="1232" height="276" rx="28" fill="url(#case)" stroke="#484f58" stroke-width="2" filter="url(#shadow)"/>
  <rect x="42" y="36" width="1196" height="240" rx="18" fill="url(#board)" stroke="#30363d" stroke-width="2"/>
  <g font-family="Avenir Next, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="71" y="62" width="200" height="40" rx="8" fill="#1f6feb"/>
    <text x="89" y="88" fill="#ffffff" font-size="15" font-weight="800" letter-spacing="1.3">03 · ML PLATFORM</text>
    <text x="71" y="159" fill="#f0f6fc" font-size="52" font-weight="800">WaterNet</text>
    <text x="72" y="199" fill="#b1bac4" font-size="22" font-weight="600">Traceable water-potability classification behind a Django API.</text>
    <text x="72" y="243" fill="#8b949e" font-size="17" font-weight="750">PYTHON · DJANGO · SCIKIT-LEARN · XGBOOST · MYSQL</text>
    <g transform="translate(748 64)" filter="url(#small)">
      <rect width="438" height="180" rx="15" fill="url(#screen)" stroke="#484f58" stroke-width="1.5"/>
      <text x="24" y="35" fill="#8b949e" font-size="14" font-weight="780" letter-spacing="1.7">MODEL SIGNAL PATH</text>
      <g fill="#58a6ff"><circle cx="42" cy="68" r="6"/><circle cx="68" cy="68" r="6"/><circle cx="94" cy="68" r="6"/><circle cx="42" cy="94" r="6"/><circle cx="68" cy="94" r="6"/><circle cx="94" cy="94" r="6"/><circle cx="42" cy="120" r="6"/><circle cx="68" cy="120" r="6"/><circle cx="94" cy="120" r="6"/></g>
      <text x="68" y="156" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="800">9 FEATURES</text>
      <path d="M112 94h48" stroke="#58a6ff" stroke-width="3"/><path d="m153 87 10 7-10 7" fill="none" stroke="#58a6ff" stroke-width="3"/>
      <g transform="translate(170 61)"><rect width="116" height="70" rx="10" fill="#161b22" stroke="#58a6ff"/><text x="58" y="26" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="800">RF · SVM · XGB</text><text x="58" y="51" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="850">VOTE</text></g>
      <path d="M293 94h42" stroke="#58a6ff" stroke-width="3"/><path d="m328 87 10 7-10 7" fill="none" stroke="#58a6ff" stroke-width="3"/>
      <g transform="translate(345 61)"><rect width="70" height="70" rx="10" fill="#12261a" stroke="#3fb950"/><text x="35" y="31" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="850">0.96</text><text x="35" y="53" text-anchor="middle" fill="#56d364" font-size="12" font-weight="800">AUC</text></g>
      <text x="220" y="162" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="800" letter-spacing="0.8">95%+ ACCURACY · 3,000+ SAMPLES · SUB-50 MS</text>
    </g>
  </g>
</svg>
