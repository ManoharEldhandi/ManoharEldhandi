<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="316" viewBox="0 0 1280 316" role="img" aria-labelledby="title desc">
  <title id="title">WaterNet - Water Potability and Quality Classification Platform</title>
  <desc id="desc">A clean dark navy project card with gold edging and a model voting diagram.</desc>
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#17263b"/><stop offset="1" stop-color="#09111e"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#111d2f"/><stop offset="1" stop-color="#080f1b"/></linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#efd594"/><stop offset="0.5" stop-color="#c29a4f"/><stop offset="1" stop-color="#6f542b"/></linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="160%"><feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#03070d" flood-opacity="0.46"/></filter>
  </defs>
  <rect width="1280" height="316" fill="#0a111d"/>
  <path d="M24 0V316M1256 0V316" stroke="#c29a4f" stroke-width="4"/>
  <rect x="50" y="18" width="1180" height="280" rx="17" fill="url(#plate)" stroke="#718096" stroke-width="2"/>
  <g text-rendering="geometricPrecision">
    <rect x="70" y="61" width="190" height="40" rx="7" fill="#d6b56d"/>
    <text x="88" y="88" fill="#172238" font-family="Trebuchet MS, Verdana, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">03 · ML PLATFORM</text>
    <text x="70" y="163" fill="#fffaf0" font-family="Georgia, Times New Roman, serif" font-size="55" font-weight="700">WaterNet</text>
    <text x="72" y="205" fill="#c1d3e9" font-family="Trebuchet MS, Verdana, sans-serif" font-size="23" font-weight="700">Traceable water-potability classification behind a Django API.</text>
    <text x="72" y="247" fill="#9fb2ca" font-family="Trebuchet MS, Verdana, sans-serif" font-size="18" font-weight="700">Nine signals · three models · one stored result</text>

    <rect x="744" y="62" width="442" height="182" rx="14" fill="url(#screen)" stroke="#596b83" stroke-width="1.5"/>
    <text x="773" y="99" fill="#d6b56d" font-family="Trebuchet MS, Verdana, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">MODEL SIGNAL PATH</text>
    <g fill="#75b5ff"><circle cx="792" cy="132" r="6"/><circle cx="818" cy="132" r="6"/><circle cx="844" cy="132" r="6"/><circle cx="792" cy="158" r="6"/><circle cx="818" cy="158" r="6"/><circle cx="844" cy="158" r="6"/><circle cx="792" cy="184" r="6"/><circle cx="818" cy="184" r="6"/><circle cx="844" cy="184" r="6"/></g>
    <path d="M864 158h45" stroke="#d6b56d" stroke-width="3"/><path d="m902 151 10 7-10 7" fill="none" stroke="#d6b56d" stroke-width="3"/>
    <rect x="922" y="123" width="122" height="70" rx="9" fill="#111d2f" stroke="#7187a3"/>
    <text x="983" y="150" text-anchor="middle" fill="#fffaf0" font-family="Trebuchet MS, Verdana, sans-serif" font-size="14" font-weight="700">RF · SVM · XGB</text><text x="983" y="176" text-anchor="middle" fill="#d6b56d" font-family="Trebuchet MS, Verdana, sans-serif" font-size="16" font-weight="700">VOTE</text>
    <path d="M1054 158h38" stroke="#d6b56d" stroke-width="3"/><path d="m1085 151 10 7-10 7" fill="none" stroke="#d6b56d" stroke-width="3"/>
    <rect x="1105" y="123" width="58" height="70" rx="9" fill="#10251a" stroke="#55d187"/>
    <text x="1134" y="153" text-anchor="middle" fill="#fffaf0" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700">0.96</text><text x="1134" y="177" text-anchor="middle" fill="#55d187" font-family="Trebuchet MS, Verdana, sans-serif" font-size="14" font-weight="700">AUC</text>
    <text x="963" y="222" text-anchor="middle" fill="#c5d2e2" font-family="Trebuchet MS, Verdana, sans-serif" font-size="14" font-weight="700">95%+ accuracy · 3,000+ samples · sub-50 ms</text>
  </g>
