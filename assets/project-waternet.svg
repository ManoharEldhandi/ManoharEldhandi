<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="310" viewBox="0 0 1280 310" role="img" aria-labelledby="title desc">
  <title id="title">WaterNet - Water Potability and Quality Classification Platform</title>
  <desc id="desc">A tactile project card illustrating nine water chemistry inputs flowing through a three-model voting ensemble to a traceable prediction API.</desc>
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#efe8dc"/><stop offset="1" stop-color="#b8b0a4"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#15243a"/><stop offset="1" stop-color="#091321"/></linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#080c13" flood-opacity="0.3"/></filter>
  </defs>
  <rect x="24" y="18" width="1232" height="270" rx="28" fill="url(#case)" stroke="#777168" stroke-width="2" filter="url(#shadow)"/>
  <rect x="42" y="36" width="1196" height="234" rx="18" fill="url(#screen)" stroke="#07101d" stroke-width="2"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="71" y="62" width="180" height="34" rx="7" fill="#58d5c6"/>
    <text x="88" y="84" fill="#102635" font-size="13" font-weight="800" letter-spacing="1.6">03 · ML PLATFORM</text>
    <text x="71" y="148" fill="#fffaf0" font-size="43" font-weight="780">WaterNet</text>
    <text x="72" y="182" fill="#abc0dc" font-size="19">Traceable water-potability classification behind a Django API.</text>
    <text x="72" y="223" fill="#d9e0e9" font-size="15" font-weight="650">PYTHON · DJANGO · SCIKIT-LEARN · XGBOOST · MYSQL</text>

    <g transform="translate(750 62)">
      <rect width="435" height="178" rx="15" fill="#0a1220" stroke="#354b68" stroke-width="1.5"/>
      <text x="24" y="31" fill="#8296af" font-size="12" font-weight="700" letter-spacing="2">MODEL SIGNAL PATH</text>
      <g fill="#58d5c6">
        <circle cx="42" cy="64" r="5"/><circle cx="66" cy="64" r="5"/><circle cx="90" cy="64" r="5"/>
        <circle cx="42" cy="88" r="5"/><circle cx="66" cy="88" r="5"/><circle cx="90" cy="88" r="5"/>
        <circle cx="42" cy="112" r="5"/><circle cx="66" cy="112" r="5"/><circle cx="90" cy="112" r="5"/>
      </g>
      <text x="66" y="145" text-anchor="middle" fill="#8fa4bd" font-size="10" font-weight="700">9 FEATURES</text>
      <path d="M106 88h50" stroke="#58d5c6" stroke-width="3"/><path d="m149 81 10 7-10 7" fill="none" stroke="#58d5c6" stroke-width="3"/>
      <g transform="translate(166 55)">
        <rect width="112" height="68" rx="10" fill="#162b38" stroke="#58d5c6"/>
        <text x="56" y="24" text-anchor="middle" fill="#dffdf8" font-size="10" font-weight="750">RF · SVM · XGB</text>
        <text x="56" y="47" text-anchor="middle" fill="#77e4d6" font-size="12" font-weight="800">VOTE</text>
      </g>
      <path d="M285 88h44" stroke="#58d5c6" stroke-width="3"/><path d="m322 81 10 7-10 7" fill="none" stroke="#58d5c6" stroke-width="3"/>
      <g transform="translate(339 55)">
        <rect width="72" height="68" rx="10" fill="#143224" stroke="#55d187"/>
        <text x="36" y="29" text-anchor="middle" fill="#e6fff0" font-size="16" font-weight="800">0.96</text>
        <text x="36" y="49" text-anchor="middle" fill="#8ee4aa" font-size="10" font-weight="750">AUC</text>
      </g>
      <text x="218" y="153" text-anchor="middle" fill="#91a4bb" font-size="10" font-weight="700" letter-spacing="1.1">95%+ ACCURACY · 3,000+ SAMPLES · SUB-50 MS</text>
    </g>
  </g>
</svg>
