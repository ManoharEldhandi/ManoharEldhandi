<svg xmlns="http://www.w3.org/2000/svg" width="960" height="410" viewBox="0 0 960 410" role="img" aria-labelledby="title desc">
  <title id="title">Skills board</title><desc id="desc">A professional colorful skills board with grouped, readable skill chips.</desc>
  <defs><pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#0b0b0b" stroke-opacity=".08" /></pattern><filter id="shadow" x="-8%" y="-8%" width="120%" height="120%"><feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#0b0b0b" flood-opacity="1" /></filter><style><![CDATA[
    .line{stroke:#0b0b0b;stroke-width:3}.thin{stroke:#0b0b0b;stroke-width:2}.sans{font-family:"Space Grotesk","Trebuchet MS",Arial,sans-serif;font-weight:900}.mono{font-family:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;font-weight:850}.label{font-size:14px;fill:#0b0b0b}.chip{font-size:14px;fill:#0b0b0b}.chipw{font-size:14px;fill:#fffdf5}.r1{animation:pulse 4s ease-in-out infinite}.r2{animation:pulse 4s ease-in-out .45s infinite}.r3{animation:pulse 4s ease-in-out .9s infinite}.r4{animation:pulse 4s ease-in-out 1.35s infinite}.r5{animation:pulse 4s ease-in-out 1.8s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.82}}
  ]]></style></defs>
  <rect width="960" height="410" fill="#f5f1e8" /><rect width="960" height="410" fill="url(#grid)" />
  <g filter="url(#shadow)"><rect x="28" y="28" width="904" height="348" fill="#fffdf5" class="line" /></g><rect x="28" y="28" width="904" height="348" fill="#fffdf5" class="line" />
  <rect x="28" y="28" width="904" height="58" fill="#0b0b0b" /><rect x="54" y="54" width="154" height="8" fill="#ffd426" /><rect x="224" y="54" width="110" height="8" fill="#00a7b5" /><rect x="350" y="54" width="132" height="8" fill="#ff5a8a" />
  <g class="r1"><rect x="54" y="114" width="164" height="38" fill="#ffd426" class="thin" /><text x="70" y="139" class="mono label">LANGUAGES</text><rect x="244" y="114" width="94" height="38" fill="#ffd426" class="thin" /><text x="263" y="139" class="mono chip">Java</text><rect x="352" y="114" width="112" height="38" fill="#ff5a8a" class="thin" /><text x="371" y="139" class="mono chip">Python</text><rect x="478" y="114" width="86" height="38" fill="#00a7b5" class="thin" /><text x="497" y="139" class="mono chip">SQL</text></g>
