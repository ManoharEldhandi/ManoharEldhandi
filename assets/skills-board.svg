  <g class="r3"><rect x="54" y="214" width="164" height="38" fill="#dff5e7" class="thin" /><text x="70" y="239" class="mono label">AI SYSTEMS</text><rect x="244" y="214" width="126" height="38" fill="#dff5e7" class="thin" /><text x="263" y="239" class="mono chip">LangGraph</text><rect x="384" y="214" width="82" height="38" fill="#ffd426" class="thin" /><text x="403" y="239" class="mono chip">MCP</text><rect x="480" y="214" width="82" height="38" fill="#00a7b5" class="thin" /><text x="499" y="239" class="mono chip">RAG</text><rect x="576" y="214" width="82" height="38" fill="#ff5a8a" class="thin" /><text x="595" y="239" class="mono chip">LLMs</text><rect x="672" y="214" width="164" height="38" fill="#2454ff" class="thin" /><text x="691" y="239" class="mono chipw">Vector Search</text></g>
