<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300" role="img" aria-labelledby="title desc">
  <title id="title">Selected impact from Manohar's current Cisco role</title>
  <desc id="desc">Four clear cards show adoption across four product teams, support for more than fifty engineers, seventy percent less manual review effort, and sixty percent less manual QA effort.</desc>
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#17263b"/><stop offset="1" stop-color="#09111e"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#17263b"/><stop offset="1" stop-color="#101a2a"/></linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#efd594"/><stop offset="0.5" stop-color="#c29a4f"/><stop offset="1" stop-color="#6f542b"/></linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="160%"><feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#03070d" flood-opacity="0.46"/></filter>
  </defs>
  <rect x="24" y="20" width="1232" height="258" rx="28" fill="#0a111d" stroke="url(#edge)" stroke-width="4" filter="url(#shadow)"/>
  <rect x="40" y="36" width="1200" height="226" rx="18" fill="url(#plate)" stroke="#34465e" stroke-width="2"/>
  <g text-rendering="geometricPrecision" font-family="Trebuchet MS, Verdana, sans-serif">
    <text x="70" y="76" fill="#d6b56d" font-size="17" font-weight="700" letter-spacing="2">CURRENT IMPACT</text>
    <g>
      <rect x="69" y="94" width="266" height="134" rx="13" fill="url(#card)" stroke="#596b83"/>
      <path d="M69 99H335" stroke="#d6b56d" stroke-width="4"/>
      <text x="91" y="164" fill="#fffaf0" font-family="Georgia, Times New Roman, serif" font-size="58" font-weight="700">4</text>
      <text x="160" y="143" fill="#e4edf7" font-size="16" font-weight="700">PRODUCT</text><text x="160" y="166" fill="#e4edf7" font-size="16" font-weight="700">TEAMS</text>
      <text x="91" y="207" fill="#9fb2ca" font-size="15">platform adoption</text>
    </g>
    <g>
      <rect x="361" y="94" width="266" height="134" rx="13" fill="url(#card)" stroke="#596b83"/>
      <path d="M361 99H627" stroke="#75b5ff" stroke-width="4"/>
      <text x="383" y="164" fill="#fffaf0" font-family="Georgia, Times New Roman, serif" font-size="58" font-weight="700">50+</text>
      <text x="504" y="143" fill="#e4edf7" font-size="15" font-weight="700">ENGINEERING</text><text x="504" y="166" fill="#e4edf7" font-size="15" font-weight="700">USERS</text>
      <text x="383" y="207" fill="#9fb2ca" font-size="15">one secure MCP interface</text>
    </g>
    <g>
      <rect x="653" y="94" width="266" height="134" rx="13" fill="url(#card)" stroke="#596b83"/>
      <path d="M653 99H919" stroke="#d6b56d" stroke-width="4"/>
      <text x="675" y="164" fill="#fffaf0" font-family="Georgia, Times New Roman, serif" font-size="54" font-weight="700">70%</text>
      <text x="800" y="143" fill="#e4edf7" font-size="14" font-weight="700">LESS MANUAL</text><text x="800" y="166" fill="#e4edf7" font-size="14" font-weight="700">REVIEW EFFORT</text>
      <text x="675" y="207" fill="#9fb2ca" font-size="15">security-risk workflows</text>
    </g>
    <g>
      <rect x="945" y="94" width="266" height="134" rx="13" fill="url(#card)" stroke="#596b83"/>
      <path d="M945 99H1211" stroke="#55d187" stroke-width="4"/>
      <text x="967" y="164" fill="#fffaf0" font-family="Georgia, Times New Roman, serif" font-size="54" font-weight="700">60%</text>
      <text x="1092" y="143" fill="#e4edf7" font-size="14" font-weight="700">LESS MANUAL</text><text x="1092" y="166" fill="#e4edf7" font-size="14" font-weight="700">QA EFFORT</text>
      <text x="967" y="207" fill="#9fb2ca" font-size="15">200+ automated tests</text>
    </g>
  </g>
</svg>
