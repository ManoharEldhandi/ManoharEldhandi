<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="286" viewBox="0 0 1280 286" role="img" aria-labelledby="title desc">
  <title id="title">Selected impact from Manohar's current Cisco role</title>
  <desc id="desc">Four instrument cards show adoption across four product teams, support for more than fifty engineers, seventy percent less manual review effort, and sixty percent less manual QA effort.</desc>
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ece5d9"/>
      <stop offset="1" stop-color="#b7afa2"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="1" stop-color="#e5ded1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#080c13" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="24" y="20" width="1232" height="246" rx="28" fill="url(#case)" stroke="#79736a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="36" width="1200" height="214" rx="19" fill="#101b2b" stroke="#08101d" stroke-width="2"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="70" y="73" fill="#869ab4" font-size="13" font-weight="700" letter-spacing="2.5">IMPACT LEDGER · CURRENT ROLE</text>

    <g transform="translate(69 91)">
      <rect width="266" height="130" rx="14" fill="url(#face)" stroke="#686158"/>
      <path d="M18 112H248" stroke="#c7bfb2"/>
      <text x="22" y="63" fill="#16243a" font-size="48" font-weight="780">4</text>
      <text x="91" y="49" fill="#32445d" font-size="14" font-weight="750" letter-spacing="1">PRODUCT</text>
      <text x="91" y="70" fill="#32445d" font-size="14" font-weight="750" letter-spacing="1">TEAMS</text>
      <circle cx="229" cy="25" r="7" fill="#55d187"/><circle cx="229" cy="25" r="3" fill="#d3ffe2"/>
      <text x="22" y="102" fill="#6c665f" font-size="13">platform adoption</text>
    </g>

    <g transform="translate(361 91)">
      <rect width="266" height="130" rx="14" fill="url(#face)" stroke="#686158"/>
      <path d="M18 112H248" stroke="#c7bfb2"/>
      <text x="22" y="63" fill="#16243a" font-size="48" font-weight="780">50+</text>
      <text x="137" y="49" fill="#32445d" font-size="14" font-weight="750" letter-spacing="1">ENGINEERING</text>
      <text x="137" y="70" fill="#32445d" font-size="14" font-weight="750" letter-spacing="1">USERS</text>
      <circle cx="229" cy="25" r="7" fill="#5aa8ff"/><circle cx="229" cy="25" r="3" fill="#d5eaff"/>
      <text x="22" y="102" fill="#6c665f" font-size="13">one secure MCP interface</text>
    </g>

    <g transform="translate(653 91)">
      <rect width="266" height="130" rx="14" fill="url(#face)" stroke="#686158"/>
      <path d="M18 112H248" stroke="#c7bfb2"/>
      <text x="22" y="63" fill="#16243a" font-size="48" font-weight="780">70%</text>
      <text x="135" y="49" fill="#32445d" font-size="14" font-weight="750" letter-spacing="1">LESS MANUAL</text>
      <text x="135" y="70" fill="#32445d" font-size="14" font-weight="750" letter-spacing="1">REVIEW EFFORT</text>
      <circle cx="229" cy="25" r="7" fill="#f5b942"/><circle cx="229" cy="25" r="3" fill="#fff0ae"/>
      <text x="22" y="102" fill="#6c665f" font-size="13">security-risk workflows</text>
    </g>

    <g transform="translate(945 91)">
      <rect width="266" height="130" rx="14" fill="url(#face)" stroke="#686158"/>
      <path d="M18 112H248" stroke="#c7bfb2"/>
      <text x="22" y="63" fill="#16243a" font-size="48" font-weight="780">60%</text>
      <text x="135" y="49" fill="#32445d" font-size="14" font-weight="750" letter-spacing="1">LESS MANUAL</text>
      <text x="135" y="70" fill="#32445d" font-size="14" font-weight="750" letter-spacing="1">QA EFFORT</text>
      <circle cx="229" cy="25" r="7" fill="#ef7188"/><circle cx="229" cy="25" r="3" fill="#ffdbe2"/>
      <text x="22" y="102" fill="#6c665f" font-size="13">200+ automated test cases</text>
    </g>
  </g>
</svg>
