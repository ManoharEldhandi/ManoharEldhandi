<svg xmlns="http://www.w3.org/2000/svg" width="980" height="78" viewBox="0 0 980 78" role="img" aria-labelledby="title desc">
  <title id="title">Animated engineering focus lines</title>
  <desc id="desc">Four typewriter lines cycling through Cisco AI systems, backend APIs, MCP and LangGraph, and competitive programming.</desc>
  <defs>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 20px; font-weight: 800; letter-spacing: 0; }
      .cursor { animation: blink 0.9s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0.18; } }
    </style>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#0b111d" />
    </linearGradient>
    <clipPath id="clip-one">
      <rect x="262" y="0" width="0" height="78">
        <animate attributeName="width" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.02;0.17;0.22;0.245;1" values="0;0;456;456;0;0" />
      </rect>
    </clipPath>
    <clipPath id="clip-two">
      <rect x="316" y="0" width="0" height="78">
        <animate attributeName="width" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.25;0.27;0.42;0.47;0.495;1" values="0;0;0;348;348;0;0" />
      </rect>
    </clipPath>
    <clipPath id="clip-three">
      <rect x="244" y="0" width="0" height="78">
        <animate attributeName="width" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.50;0.52;0.67;0.72;0.745;1" values="0;0;0;492;492;0;0" />
      </rect>
    </clipPath>
    <clipPath id="clip-four">
      <rect x="216" y="0" width="0" height="78">
        <animate attributeName="width" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.75;0.77;0.92;0.97;0.995;1" values="0;0;0;548;548;0;0" />
      </rect>
    </clipPath>
  </defs>

  <rect x="2" y="8" width="976" height="62" rx="22" fill="url(#frame)" stroke="#30363d" />
  <path d="M36 39 H120 M860 39 H944" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" stroke-linecap="round" />

  <g>
    <animate attributeName="opacity" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.02;0.22;0.245;1" values="1;1;1;0;0" />
    <text class="mono" x="262" y="47" fill="#f97316" clip-path="url(#clip-one)">Shipping practical AI systems at Cisco</text>
    <rect class="cursor" x="262" y="24" width="3" height="27" rx="1.5" fill="#f97316">
      <animate attributeName="x" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.02;0.17;0.22;0.245;1" values="262;262;726;726;262;262" />
    </rect>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.25;0.27;0.47;0.495;1" values="0;0;1;1;0;0" />
    <text class="mono" x="316" y="47" fill="#22c55e" clip-path="url(#clip-two)">Designing secure backend APIs</text>
    <rect class="cursor" x="316" y="24" width="3" height="27" rx="1.5" fill="#22c55e">
      <animate attributeName="x" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.25;0.27;0.42;0.47;0.495;1" values="316;316;316;672;672;316;316" />
    </rect>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.50;0.52;0.72;0.745;1" values="0;0;1;1;0;0" />
    <text class="mono" x="244" y="47" fill="#a855f7" clip-path="url(#clip-three)">Connecting tools with MCP and LangGraph</text>
    <rect class="cursor" x="244" y="24" width="3" height="27" rx="1.5" fill="#a855f7">
      <animate attributeName="x" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.50;0.52;0.67;0.72;0.745;1" values="244;244;244;744;744;244;244" />
    </rect>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.75;0.77;0.97;0.995;1" values="0;0;1;1;0;0" />
    <text class="mono" x="216" y="47" fill="#facc15" clip-path="url(#clip-four)">Solving hard problems with contest discipline</text>
    <rect class="cursor" x="216" y="24" width="3" height="27" rx="1.5" fill="#facc15">
      <animate attributeName="x" dur="14.4s" repeatCount="indefinite" keyTimes="0;0.75;0.77;0.92;0.97;0.995;1" values="216;216;216;772;772;216;216" />
    </rect>
  </g>
</svg>
