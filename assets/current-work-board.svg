<svg xmlns="http://www.w3.org/2000/svg" width="960" height="330" viewBox="0 0 960 330" role="img" aria-labelledby="title desc">
  <title id="title">Current work board</title>
  <desc id="desc">A colorful current work board showing Cisco AI compliance platform impact and engineering workflows.</desc>
  <defs><pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#0b0b0b" stroke-opacity=".08" /></pattern><filter id="shadow" x="-8%" y="-8%" width="120%" height="120%"><feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#0b0b0b" flood-opacity="1" /></filter><style><![CDATA[
    .line{stroke:#0b0b0b;stroke-width:3}.thin{stroke:#0b0b0b;stroke-width:2}.sans{font-family:"Space Grotesk","Trebuchet MS",Arial,sans-serif;font-weight:900}.body{font-family:"Space Grotesk","Trebuchet MS",Arial,sans-serif;font-weight:650}.mono{font-family:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;font-weight:850}.small{font-size:12px}.title{font-size:31px}.copy{font-size:16px}.card1{animation:fade 4.4s ease-in-out infinite}.card2{animation:fade 4.4s ease-in-out .4s infinite}.card3{animation:fade 4.4s ease-in-out .8s infinite}.card4{animation:fade 4.4s ease-in-out 1.2s infinite}@keyframes fade{0%,100%{opacity:1}50%{opacity:.82}}
  ]]></style></defs>
  <rect width="960" height="330" fill="#f5f1e8" /><rect width="960" height="330" fill="url(#grid)" />
  <g filter="url(#shadow)"><rect x="28" y="28" width="904" height="272" fill="#fffdf5" class="line" /></g><rect x="28" y="28" width="904" height="272" fill="#fffdf5" class="line" />
  <rect x="28" y="28" width="262" height="272" fill="#0b0b0b" /><text x="56" y="102" class="sans title" fill="#fffdf5">Cisco AI</text><text x="56" y="136" class="sans title" fill="#fffdf5">compliance</text><text x="56" y="182" class="body copy" fill="#d8d0be">Secure internal tools,</text><text x="56" y="206" class="body copy" fill="#d8d0be">traceable automation,</text><text x="56" y="230" class="body copy" fill="#d8d0be">and release confidence.</text><rect x="56" y="258" width="122" height="16" fill="#00a7b5" />
  <g class="card1" filter="url(#shadow)"><rect x="326" y="56" width="258" height="92" fill="#ffd426" class="line" /><text x="348" y="87" class="mono small" fill="#0b0b0b">PLATFORM IMPACT</text><text x="348" y="117" class="body copy" fill="#0b0b0b">Adopted across</text><text x="348" y="138" class="body copy" fill="#b12020" font-weight="900">4 Cisco products</text></g>
  <g class="card2" filter="url(#shadow)"><rect x="620" y="56" width="258" height="92" fill="#dff5e7" class="line" /><text x="642" y="87" class="mono small" fill="#0b0b0b">ENGINEERING USERS</text><text x="642" y="117" class="body copy" fill="#11824a" font-weight="900">50+ engineers</text><text x="642" y="138" class="body copy" fill="#0b0b0b">one MCP interface</text></g>
  <g class="card3" filter="url(#shadow)"><rect x="326" y="184" width="258" height="92" fill="#e5ecff" class="line" /><text x="348" y="215" class="mono small" fill="#0b0b0b">AI WORKFLOWS</text><text x="348" y="245" class="body copy" fill="#0b0b0b">LangGraph/RAG across</text><text x="348" y="266" class="body copy" fill="#2454ff" font-weight="900">10+ releases</text></g>
  <g class="card4" filter="url(#shadow)"><rect x="620" y="184" width="258" height="92" fill="#ffe7e7" class="line" /><text x="642" y="215" class="mono small" fill="#0b0b0b">TEST AUTOMATION</text><text x="642" y="245" class="body copy" fill="#b76500" font-weight="900">200+ tests</text><text x="642" y="266" class="body copy" fill="#0b0b0b">QA effort down 60%</text></g>
</svg>