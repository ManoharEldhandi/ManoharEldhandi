<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Coding profiles and highlights board</title><desc id="desc">Uniform coding profile cards and achievement highlights.</desc>
  <defs><pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#0b0b0b" stroke-opacity="0.08"/></pattern><filter id="shadow" x="-8%" y="-8%" width="120%" height="120%"><feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#0b0b0b"/></filter><style><![CDATA[
    .line{stroke:#0b0b0b;stroke-width:3}.thin{stroke:#0b0b0b;stroke-width:2}.sans{font-family:"Space Grotesk","Trebuchet MS",Arial,sans-serif;font-weight:900}.body{font-family:"Space Grotesk","Trebuchet MS",Arial,sans-serif;font-weight:700}.mono{font-family:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;font-weight:850}.c1{animation:fade 4s ease-in-out infinite}.c2{animation:fade 4s ease-in-out .7s infinite}.c3{animation:fade 4s ease-in-out 1.4s infinite}@keyframes fade{0%,100%{opacity:1}50%{opacity:.86}}
  ]]></style></defs>
  <rect width="960" height="430" fill="#f5f1e8"/><rect width="960" height="430" fill="url(#grid)"/><g filter="url(#shadow)"><rect x="30" y="28" width="900" height="355" fill="#fffdf5" class="line"/></g><rect x="30" y="28" width="900" height="355" fill="#fffdf5" class="line"/><rect x="30" y="28" width="900" height="62" fill="#0b0b0b"/>
  <rect x="58" y="58" width="154" height="8" fill="#ffd426" /><rect x="228" y="58" width="110" height="8" fill="#b76500" /><rect x="354" y="58" width="132" height="8" fill="#ff5a8a" />
  <g class="c1" filter="url(#shadow)"><rect x="58" y="118" width="260" height="128" fill="#ffd426" class="line"/><text x="80" y="158" class="sans" font-size="28" fill="#0b0b0b">Codeforces</text><text x="80" y="190" class="body" font-size="16" fill="#0b0b0b">Master, rating 2128</text><text x="80" y="220" class="mono" font-size="12" fill="#0b0b0b">Rank 252 / 24,000+</text></g>
  <g class="c2" filter="url(#shadow)"><rect x="350" y="118" width="260" height="128" fill="#b76500" class="line"/><text x="372" y="158" class="sans" font-size="28" fill="#fffdf5">CodeChef</text><text x="372" y="190" class="body" font-size="16" fill="#fffdf5">4-star, rating 1893</text><text x="372" y="220" class="mono" font-size="12" fill="#fffdf5">Global rank 13</text></g>
  <g class="c3" filter="url(#shadow)"><rect x="642" y="118" width="260" height="128" fill="#ff5a8a" class="line"/><text x="664" y="158" class="sans" font-size="28" fill="#0b0b0b">LeetCode</text><text x="664" y="190" class="body" font-size="16" fill="#0b0b0b">553+ problems solved</text><text x="664" y="220" class="mono" font-size="12" fill="#0b0b0b">Graphs / DP / Patterns</text></g>
  <rect x="58" y="282" width="390" height="34" fill="#e5ecff" class="thin"/><text x="78" y="304" class="body" font-size="15">Amazon ML Summer School: top 1% of 50,000+</text>
  <rect x="474" y="282" width="390" height="34" fill="#dff5e7" class="thin"/><text x="494" y="304" class="body" font-size="15">HackerEarth ML Challenge: global Top 50</text>
  <rect x="58" y="330" width="390" height="34" fill="#ffe7e7" class="thin"/><text x="78" y="352" class="body" font-size="15">Cisco WebEx Playtime: Top 35 of 2,000+</text>
  <rect x="474" y="330" width="390" height="34" fill="#ffd426" class="thin"/><text x="494" y="352" class="body" font-size="15">150+ DSA mentees + LER_DSA open source</text>
</svg>