<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="316" viewBox="0 0 1280 316" role="img" aria-labelledby="title desc">
  <title id="title">Carivyo-AI - Local-First Job Search and Application Platform</title>
  <desc id="desc">A clean dark navy project card with gold edging and a human-reviewed application pipeline.</desc>
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#17263b"/><stop offset="1" stop-color="#09111e"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#111d2f"/><stop offset="1" stop-color="#080f1b"/></linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#efd594"/><stop offset="0.5" stop-color="#c29a4f"/><stop offset="1" stop-color="#6f542b"/></linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="160%"><feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#03070d" flood-opacity="0.46"/></filter>
  </defs>
  <rect width="1280" height="316" fill="#0a111d"/>
  <path d="M24 0V316M1256 0V316" stroke="#c29a4f" stroke-width="4"/>
  <rect x="50" y="18" width="1180" height="280" rx="17" fill="url(#plate)" stroke="#718096" stroke-width="2"/>
  <g text-rendering="geometricPrecision">
    <rect x="70" y="61" width="218" height="40" rx="7" fill="#d6b56d"/>
    <text x="88" y="88" fill="#172238" font-family="Trebuchet MS, Verdana, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">02 · LOCAL-FIRST AI</text>
    <text x="70" y="163" fill="#fffaf0" font-family="Georgia, Times New Roman, serif" font-size="55" font-weight="700">Carivyo-AI</text>
    <text x="72" y="205" fill="#c1d3e9" font-family="Trebuchet MS, Verdana, sans-serif" font-size="23" font-weight="700">Evidence-grounded job discovery and application support.</text>
    <text x="72" y="247" fill="#9fb2ca" font-family="Trebuchet MS, Verdana, sans-serif" font-size="18" font-weight="700">Local-first · private by design · human reviewed</text>

    <rect x="728" y="62" width="458" height="182" rx="14" fill="url(#screen)" stroke="#596b83" stroke-width="1.5"/>
    <text x="756" y="99" fill="#d6b56d" font-family="Trebuchet MS, Verdana, sans-serif" font-size="15" font-weight="700" letter-spacing="1.2">HUMAN-IN-THE-LOOP</text>
    <g font-family="Trebuchet MS, Verdana, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
      <rect x="752" y="124" width="98" height="62" rx="8" fill="#111d2f" stroke="#7187a3"/><text x="801" y="150" fill="#fffaf0">DISCOVER</text><text x="801" y="172" fill="#9fb2ca">5 ATS</text>
      <path d="M857 155h29" stroke="#d6b56d" stroke-width="3"/><path d="m879 149 8 6-8 6" fill="none" stroke="#d6b56d" stroke-width="3"/>
      <rect x="895" y="124" width="98" height="62" rx="8" fill="#111d2f" stroke="#7187a3"/><text x="944" y="150" fill="#fffaf0">SCORE</text><text x="944" y="172" fill="#9fb2ca">EVIDENCE</text>
      <path d="M1000 155h29" stroke="#d6b56d" stroke-width="3"/><path d="m1022 149 8 6-8 6" fill="none" stroke="#d6b56d" stroke-width="3"/>
      <rect x="1038" y="124" width="98" height="62" rx="8" fill="#111d2f" stroke="#7187a3"/><text x="1087" y="150" fill="#fffaf0">PREPARE</text><text x="1087" y="172" fill="#9fb2ca">MATERIALS</text>
    </g>
    <circle cx="1155" cy="155" r="18" fill="#10251a" stroke="#55d187" stroke-width="2"/><path d="m1147 155 6 6 11-14" fill="none" stroke="#55d187" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="957" y="219" text-anchor="middle" fill="#c5d2e2" font-family="Trebuchet MS, Verdana, sans-serif" font-size="14" font-weight="700">Stops before submission · private data stays local</text>
  </g>
