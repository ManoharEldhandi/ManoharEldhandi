<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="310" viewBox="0 0 1280 310" role="img" aria-labelledby="title desc">
  <title id="title">Carivyo-AI - Local-First Job Search and Application Platform</title>
  <desc id="desc">A tactile project card showing a privacy-conscious pipeline from job discovery through scoring and materials to a human-reviewed application dry run.</desc>
