      <path d="M116 86h25" stroke="#58a6ff" stroke-width="3"/><path d="m136 80 8 6-8 6" fill="none" stroke="#58a6ff" stroke-width="3"/>
      <g transform="translate(149 56)"><rect width="88" height="60" rx="9" fill="#161b22" stroke="#58a6ff"/><text x="44" y="26" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="800">SCORE</text><text x="44" y="46" text-anchor="middle" fill="#8b949e" font-size="11">EVIDENCE</text></g>
