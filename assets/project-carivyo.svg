    <text x="71" y="159" fill="#f0f6fc" font-size="52" font-weight="800">Carivyo-AI</text>
    <text x="72" y="199" fill="#b1bac4" font-size="22" font-weight="600">Evidence-grounded job discovery and application assistance.</text>
    <text x="72" y="243" fill="#8b949e" font-size="17" font-weight="750">NODE.JS · LLM GATEWAY · PLAYWRIGHT · PYTHON · CLI</text>
