<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="250" viewBox="0 0 1280 250" role="img" aria-labelledby="title desc">
  <title id="title">Contact Manohar Eldhandi</title>
  <desc id="desc">A tactile closing panel inviting conversations about backend development, AI systems, machine learning, and developer tooling.</desc>
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#f1ebe0"/><stop offset="1" stop-color="#aaa397"/></linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#16263d"/><stop offset="1" stop-color="#091321"/></linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#080c13" flood-opacity="0.3"/></filter>
  </defs>
  <rect x="24" y="18" width="1232" height="210" rx="28" fill="url(#metal)" stroke="#777168" stroke-width="2" filter="url(#shadow)"/>
  <rect x="42" y="36" width="1196" height="174" rx="18" fill="url(#plate)" stroke="#07101d" stroke-width="2"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="76" y="82" fill="#8196b0" font-size="13" font-weight="750" letter-spacing="2.5">OPEN CHANNEL</text>
    <text x="76" y="137" fill="#fffaf0" font-size="41" font-weight="780">Let’s build something useful.</text>
    <text x="78" y="172" fill="#b9c7d9" font-size="17">Backend development · AI systems · machine learning · developer tooling</text>
    <g transform="translate(956 73)">
      <rect width="220" height="98" rx="14" fill="#0a1220" stroke="#354b68" stroke-width="1.5"/>
      <circle cx="36" cy="34" r="8" fill="#55d187"/><circle cx="36" cy="34" r="3" fill="#d5ffe3"/>
      <text x="58" y="40" fill="#eaf4ef" font-size="13" font-weight="750" letter-spacing="1.2">AVAILABLE</text>
      <text x="26" y="70" fill="#8fa3ba" font-size="12" font-weight="650">BENGALURU · INDIA</text>
    </g>
  </g>
