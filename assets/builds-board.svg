<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Integrated project board</title><desc id="desc">A unified colorful project board combining project names, content, metrics, and stack details.</desc>
  <defs><pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#0b0b0b" stroke-opacity=".08" /></pattern><filter id="shadow" x="-8%" y="-8%" width="120%" height="120%"><feDropShadow dx="6" dy="6" stdDeviation="0" flood-color="#0b0b0b" flood-opacity="1" /></filter><style><![CDATA[
    .line{stroke:#0b0b0b;stroke-width:3}.thin{stroke:#0b0b0b;stroke-width:2}.sans{font-family:"Space Grotesk","Trebuchet MS",Arial,sans-serif;font-weight:900}.body{font-family:"Space Grotesk","Trebuchet MS",Arial,sans-serif;font-weight:650}.mono{font-family:"IBM Plex Mono","SFMono-Regular",Consolas,monospace;font-weight:850}.title{font-size:28px}.copy{font-size:14px}.small{font-size:11px}.a{animation:glow 5s ease-in-out infinite}.b{animation:glow 5s ease-in-out .7s infinite}.c{animation:glow 5s ease-in-out 1.4s infinite}@keyframes glow{0%,100%{opacity:1}50%{opacity:.84}}
  ]]></style></defs>
  <rect width="960" height="430" fill="#f5f1e8" /><rect width="960" height="430" fill="url(#grid)" />
  <rect x="28" y="28" width="904" height="370" fill="#fffdf5" class="line" /><rect x="28" y="28" width="904" height="58" fill="#0b0b0b" /><rect x="54" y="54" width="154" height="8" fill="#ffd426" /><rect x="224" y="54" width="110" height="8" fill="#e5ecff" /><rect x="350" y="54" width="132" height="8" fill="#dff5e7" />
  <g class="a" filter="url(#shadow)"><rect x="58" y="118" width="260" height="232" fill="#ffd426" class="line" /><text x="80" y="154" class="sans title" fill="#0b0b0b">OnTheWay</text><text x="80" y="181" class="body copy" fill="#0b0b0b">Route-aware pickup platform.</text><text x="80" y="214" class="body copy" fill="#0b0b0b">ETA engine makes orders ready</text><text x="80" y="235" class="body copy" fill="#0b0b0b">exactly on arrival with keyless</text><text x="80" y="256" class="body copy" fill="#0b0b0b">routing and secure auth.</text><rect x="80" y="282" width="92" height="28" fill="#fffdf5" class="thin" /><text x="96" y="301" class="mono small">115 shops</text><rect x="184" y="282" width="92" height="28" fill="#fffdf5" class="thin" /><text x="200" y="301" class="mono small">507 items</text><text x="80" y="331" class="mono small" fill="#0b0b0b">Java / Spring / MySQL / React</text></g>
  <g class="b" filter="url(#shadow)"><rect x="350" y="118" width="260" height="232" fill="#e5ecff" class="line" /><text x="372" y="154" class="sans title" fill="#0b0b0b">Carivyo-AI</text><text x="372" y="181" class="body copy" fill="#0b0b0b">Local-first LLM job agent.</text><text x="372" y="214" class="body copy" fill="#0b0b0b">Scans company portals, scores</text><text x="372" y="235" class="body copy" fill="#0b0b0b">matches, builds materials, and</text><text x="372" y="256" class="body copy" fill="#0b0b0b">runs dry-run apply workers.</text><rect x="372" y="282" width="112" height="28" fill="#fffdf5" class="thin" /><text x="388" y="301" class="mono small">1,000+ portals</text><rect x="496" y="282" width="72" height="28" fill="#ffd426" class="thin" /><text x="514" y="301" class="mono small">5 ATS</text><text x="372" y="331" class="mono small" fill="#0b0b0b">Node / LLM Gateway / Playwright</text></g>
  <g class="c" filter="url(#shadow)"><rect x="642" y="118" width="260" height="232" fill="#dff5e7" class="line" /><text x="664" y="154" class="sans title" fill="#0b0b0b">WaterNet</text><text x="664" y="181" class="body copy" fill="#0b0b0b">Water potability ML API.</text><text x="664" y="214" class="body copy" fill="#0b0b0b">Voting ensemble over 9 water</text><text x="664" y="235" class="body copy" fill="#0b0b0b">chemistry features with Django</text><text x="664" y="256" class="body copy" fill="#0b0b0b">REST inference endpoints.</text><rect x="664" y="282" width="86" height="28" fill="#fffdf5" class="thin" /><text x="680" y="301" class="mono small">95%+ acc</text><rect x="762" y="282" width="84" height="28" fill="#ffd426" class="thin" /><text x="778" y="301" class="mono small">0.96 AUC</text><text x="664" y="331" class="mono small" fill="#0b0b0b">Python / Django / XGBoost</text></g>
</svg>