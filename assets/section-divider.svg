<svg xmlns="http://www.w3.org/2000/svg" width="940" height="54" viewBox="0 0 940 54" role="img" aria-labelledby="title desc">
  <title id="title">Animated section divider</title>
  <desc id="desc">Subtle animated divider with nature-inspired linework and a soft center pulse.</desc>
  <defs>
    <linearGradient id="dividerLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d8cbb5" stop-opacity="0" />
      <stop offset="0.18" stop-color="#d8cbb5" stop-opacity="0.7" />
      <stop offset="0.5" stop-color="#efe4cd" stop-opacity="1" />
      <stop offset="0.82" stop-color="#93a085" stop-opacity="0.68" />
      <stop offset="1" stop-color="#93a085" stop-opacity="0" />
    </linearGradient>
    <style>
      .base { fill: none; stroke: #6b685d; stroke-opacity: 0.36; stroke-width: 1.3; }
      .glow { fill: none; stroke: url(#dividerLine); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 110 150; animation: slide 8s linear infinite; }
      .halo { animation: pulse 4.2s ease-in-out infinite; }
      @keyframes slide { to { stroke-dashoffset: -260; } }
      @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.95; } }
    </style>
  </defs>

  <path class="base" d="M24 27 H376" />
  <path class="base" d="M564 27 H916" />
  <path class="base" d="M180 15 C268 15 338 18 430 27" />
  <path class="base" d="M760 15 C672 15 602 18 510 27" />
  <path class="base" d="M180 39 C268 39 338 36 430 27" />
  <path class="base" d="M760 39 C672 39 602 36 510 27" />

  <path class="glow" d="M24 27 H376" />
  <path class="glow" d="M564 27 H916" style="animation-duration: 10s" />
  <path class="glow" d="M180 15 C268 15 338 18 430 27" style="animation-duration: 9s" />
  <path class="glow" d="M760 15 C672 15 602 18 510 27" style="animation-duration: 11s" />
  <path class="glow" d="M180 39 C268 39 338 36 430 27" style="animation-duration: 9.5s" />
  <path class="glow" d="M760 39 C672 39 602 36 510 27" style="animation-duration: 11.5s" />

  <circle class="halo" cx="470" cy="27" r="5" fill="#f6efdf" />
  <circle class="halo" cx="470" cy="27" r="13" fill="none" stroke="#d8cbb5" stroke-opacity="0.22" />
</svg>