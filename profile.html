    }

    .hotspot {
      position: absolute;
      z-index: 1;
      top: var(--y);
      left: var(--x);
      width: var(--w);
      height: var(--h);
      border-radius: 0.35rem;
      cursor: pointer;
      -webkit-tap-highlight-color: rgb(117 181 255 / 22%);
    }

    .hotspot:focus-visible {
      outline: clamp(2px, 0.25vw, 4px) solid #75b5ff;
      outline-offset: clamp(1px, 0.15vw, 3px);
      background: rgb(117 181 255 / 14%);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
